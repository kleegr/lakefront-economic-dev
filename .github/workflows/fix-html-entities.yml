name: Fix HTML entity encoding in JSX files
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-encoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fix HTML entities in TSX files
        run: |
          echo "Checking for HTML entity encoding issues..."
          
          # Fix the jobs listing page
          if grep -q '&lt;' "src/app/(public)/jobs/page.tsx" 2>/dev/null; then
            echo "Fixing src/app/(public)/jobs/page.tsx"
            sed -i 's/&lt;/</g; s/&gt;/>/g; s/&amp;amp;/\&amp;/g; s/&amp;&amp;/\&\&/g; s/&amp;/\&/g' "src/app/(public)/jobs/page.tsx"
          fi
          
          echo "Done checking files."
      
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: Decode HTML entities in JSX files (automated)"
            git push
          fi
      
      - name: Cleanup workflow file
        run: |
          rm -f .github/workflows/fix-html-entities.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup needed"
          else
            git commit -m "chore: Remove one-time fix workflow"
            git push
          fi
